<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond arrondi -->
  <rect width="64" height="64" rx="14" fill="#e8500a"/>
  <!-- Silhouette coureur (stylisée) -->
  <!-- Tête -->
  <circle cx="38" cy="12" r="5" fill="white"/>
  <!-- Corps en mouvement -->
  <line x1="38" y1="17" x2="34" y2="30" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Bras gauche (en avant) -->
  <line x1="36" y1="22" x2="26" y2="19" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Bras droit (en arrière) -->
  <line x1="36" y1="22" x2="44" y2="27" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Jambe gauche (en avant, foulée) -->
  <line x1="34" y1="30" x2="24" y2="42" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="24" y1="42" x2="18" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Jambe droite (en arrière) -->
  <line x1="34" y1="30" x2="42" y2="40" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="42" y1="40" x2="48" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
